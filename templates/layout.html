<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>{{ title or "條碼紀錄前端" }}</title>
<link rel="stylesheet" href="https://cdn.datatables.net/2.0.7/css/dataTables.dataTables.min.css">
<style>
body{margin:0;padding:0;font-family:"Microsoft JhengHei",system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#f5f7fb;color:#0b2239}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#1e7bd8;color:#fff;position:sticky;top:0;z-index:9}
header .title{font-weight:700}
header .nav a{color:#dff1ff;text-decoration:none;margin-left:12px}
main{max-width:1200px;margin:0 auto;padding:14px}
.card{background:#fff;border:1px solid #d9e8fb;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 2px 10px rgba(30,123,216,.06)}
.muted{color:#5a6b80}
.btn{display:inline-block;padding:8px 12px;border-radius:10px;border:1px solid #1e7bd8;background:#1e7bd8;color:#fff;text-decoration:none;cursor:pointer}
.btn.outline{background:#fff;color:#1e7bd8}
.form-row{margin-bottom:10px}
input[type=text],input[type=number]{padding:8px 10px;border:1px solid #d9e8fb;border-radius:8px;width:280px}
table.dataTable thead th{background:#f3f9ff}
.flash{background:#fff7e6;border:1px solid #ffd591;color:#8B5A00;padding:10px;border-radius:10px;margin-bottom:10px}
.err{background:#fff1f0;border:1px solid #ffa39e;color:#a8071a;padding:10px;border-radius:10px;margin-bottom:10px}
.good{background:#f6ffed;border:1px solid #b7eb8f;color:#237804;padding:10px;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<header>
  <div class="title">📊 條碼紀錄前端</div>
  <div class="nav">
    <a href="{{ url_for('index') }}">首頁</a>
    <a href="{{ url_for('records') }}">紀錄</a>
    <a href="{{ url_for('joined') }}">合併名冊</a>
    <a href="{{ url_for('search') }}">搜尋</a>
    <a href="{{ url_for('upload') }}">上傳名冊</a>
    <a href="{{ url_for('settings') }}">設定</a>
  </div>
</header>
<main>
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for m in messages %}<div class="flash">{{ m }}</div>{% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
  <div class="muted" style="margin-top:12px">後端：<code>{{ backend_base }}</code></div>
</main>
<script src="https://cdn.datatables.net/2.0.7/js/dataTables.min.js"></script>
<script>
function enhanceTable(id){
  try{ new DataTable(id, {pageLength: 25, order: []}); }catch(e){}
}
</script>
</body>
</html>

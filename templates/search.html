{% extends "layout.html" %}
{% block content %}
<div class="card">
  <h3>搜尋</h3>
  {% if err %}<div class="err">{{ err }}</div>{% endif %}
  <form method="get" class="form-row">
    關鍵字（時間或學號）：<input type="text" name="q" value="{{ q }}" placeholder="例如 2025-11-02 或 91234"/>&nbsp;
    筆數：<input type="number" name="limit" min="10" max="100000" value="{{ limit }}"/>
    <button class="btn" type="submit">搜尋</button>
  </form>
  <table id="tbl" class="display">
    <thead><tr><th>時間</th><th>學號/ID</th></tr></thead>
    <tbody>
      {% for r in items %}<tr><td>{{ r.time }}</td><td>{{ r.id }}</td></tr>{% endfor %}
    </tbody>
  </table>
</div>
<script>enhanceTable('#tbl');</script>
{% endblock %}
